name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: pnpm/action-setup@v5
        with:
          version: 10.14.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test
      - run: pnpm lint
      - run: node dist/cli.js demo github-injection
      - run: node dist/cli.js scan examples/tools/github-tools.json
      - run: node dist/cli.js replay .agentgate/traces
